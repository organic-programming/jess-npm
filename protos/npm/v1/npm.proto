syntax = "proto3";
package npm.v1;

option go_package = "github.com/organic-programming/jess-npm/gen/go/npm/v1;npmv1";

service NpmService {

  // Package management
  rpc Init(NpmCommandRequest) returns (NpmCommandResponse);
  rpc Install(InstallRequest) returns (NpmCommandResponse);
  rpc Uninstall(NpmCommandRequest) returns (NpmCommandResponse);
  rpc Update(NpmCommandRequest) returns (NpmCommandResponse);
  rpc Add(NpmCommandRequest) returns (NpmCommandResponse);

  // Build and run
  rpc RunScript(RunScriptRequest) returns (NpmCommandResponse);
  rpc Test(NpmCommandRequest) returns (NpmCommandResponse);
  rpc Build(NpmCommandRequest) returns (NpmCommandResponse);
  rpc NodeExec(NodeExecRequest) returns (NpmCommandResponse);

  // Introspection (structured)
  rpc ListDeps(ListDepsRequest) returns (ListDepsResponse);
  rpc Audit(NpmCommandRequest) returns (AuditResponse);
  rpc Outdated(NpmCommandRequest) returns (OutdatedResponse);
  rpc ReadPackageJson(ReadPackageJsonRequest) returns (PackageJsonResponse);

  // Publishing and pack
  rpc Pack(NpmCommandRequest) returns (NpmCommandResponse);
  rpc Publish(NpmCommandRequest) returns (NpmCommandResponse);

  // Utilities
  rpc CacheClean(NpmCommandRequest) returns (NpmCommandResponse);
  rpc Npx(NpmCommandRequest) returns (NpmCommandResponse);
  rpc Version(VersionRequest) returns (VersionResponse);
}

message NpmCommandRequest {
  repeated string args = 1;
  string workdir = 2;
  repeated string env = 3; // KEY=VALUE format
  int32 timeout_s = 4;
}

message NpmCommandResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  float elapsed_s = 4;
}

message InstallRequest {
  repeated string packages = 1;
  string workdir = 2;
  repeated string env = 3;
  int32 timeout_s = 4;
  bool save_dev = 5;
  bool save_exact = 6;
  bool production = 7;
  bool legacy_peer_deps = 8;
}

message RunScriptRequest {
  string script = 1;
  repeated string args = 2;
  string workdir = 3;
  repeated string env = 4;
  int32 timeout_s = 5;
}

message NodeExecRequest {
  string file = 1;
  repeated string args = 2;
  string workdir = 3;
  repeated string env = 4;
  int32 timeout_s = 5;
  string eval = 6;
}

message ListDepsRequest {
  string workdir = 1;
  repeated string env = 2;
  bool all = 3;
  int32 depth = 4;
}

message ListDepsResponse {
  int32 exit_code = 1;
  repeated Dependency dependencies = 2;
}

message Dependency {
  string name = 1;
  string version = 2;
  string resolved = 3;
  bool dev = 4;
  bool optional = 5;
  repeated Dependency dependencies = 6;
  repeated string problems = 7;
}

message AuditResponse {
  int32 exit_code = 1;
  int32 total_vulnerabilities = 2;
  int32 critical = 3;
  int32 high = 4;
  int32 moderate = 5;
  int32 low = 6;
  int32 info = 7;
  repeated Vulnerability vulnerabilities = 8;
  string raw_json = 9;
}

message Vulnerability {
  string name = 1;
  string severity = 2;
  string title = 3;
  string url = 4;
  string range = 5;
  repeated string via = 6;
  repeated string fixAvailable = 7;
}

message OutdatedResponse {
  int32 exit_code = 1;
  repeated OutdatedPackage packages = 2;
}

message OutdatedPackage {
  string name = 1;
  string current = 2;
  string wanted = 3;
  string latest = 4;
  string location = 5;
  string type = 6;
}

message ReadPackageJsonRequest {
  string workdir = 1;
}

message PackageJsonResponse {
  string name = 1;
  string version = 2;
  string description = 3;
  string main = 4;
  string license = 5;
  map<string, string> scripts = 6;
  map<string, string> dependencies = 7;
  map<string, string> dev_dependencies = 8;
  map<string, string> peer_dependencies = 9;
  string raw_json = 10;
}

message VersionRequest {}

message VersionResponse {
  string npm_version = 1;
  string node_version = 2;
  string npx_version = 3;
}
